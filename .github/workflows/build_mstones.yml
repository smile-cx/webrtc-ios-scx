name: OnDemand Release SmileCXWebRTC [127]

permissions:
  contents: write

on:
  workflow_dispatch:    

env:  
  current_release_milestone:
  current_release_branch:
  next_release_milestone:
  next_release_branch:
  should_build: ${{ false }}
  output_name:
  next_release_tag:
  next_release_name:

  output_dir: "./out"

  IOS_32_BIT: ${{ true }}
  ENABLE_IOS_BITCODE: ${{ true }}
  
jobs:
  
  build:
    runs-on: macos-latest

    strategy:
      matrix:
        milestone: [127]

    steps:      
      - uses: actions/checkout@v4

      - name: GH Auth
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} >> token.txt
          gh auth login --with-token < token.txt
          rm token.txt          
      
      - name: Getting WebRTC release
        run: |
          # Get latest release info
          LATEST_RELEASE=$(gh api repos/${{ github.repository }}/releases | jq -r '.[0]')
          LATEST_TAG=$(echo "$LATEST_RELEASE" | jq -r '.tag_name')
          LATEST_BODY=$(echo "$LATEST_RELEASE" | jq -r '.body')

          # Extract milestone from tag (e.g., "146" from tag "146")
          current_release_milestone=$LATEST_TAG

          # Extract branch from release notes (e.g., "7680" from "WebRTC Version: 146.7680.0")
          if echo "$LATEST_BODY" | grep -q "WebRTC Version:"; then
            FULL_VERSION=$(echo "$LATEST_BODY" | grep "WebRTC Version:" | head -1 | sed 's/.*WebRTC Version: //' | tr -d ' ')
            IFS='.' read -ra VERSION_PARTS <<< "$FULL_VERSION"
            current_release_branch=${VERSION_PARTS[1]:-0}
            echo "Found current release: M$current_release_milestone (branch $current_release_branch)"
          else
            echo "⚠️ Could not parse branch from release notes, assuming 0"
            current_release_branch=0
          fi

          # Get specified milestone info
          milestones=$( curl -sL "https://chromiumdash.appspot.com/fetch_milestones?mstone=${{ matrix.milestone }}")

          echo "current_release_milestone=$current_release_milestone" >> $GITHUB_ENV
          echo "current_release_branch=$current_release_branch" >> $GITHUB_ENV
          echo "next_release_milestone=$(echo "$milestones" | jq -r ".[0].milestone")" >> $GITHUB_ENV
          echo "next_release_branch=$(echo "$milestones" | jq -r ".[0].webrtc_branch")" >> $GITHUB_ENV
          
          
      - name: Setup enviroment
        run: |
          echo "should_build=${{ true }}" >> $GITHUB_ENV
          echo "output_name=SmileCXWebRTC-${{ env.next_release_milestone }}.xcframework.zip" >> $GITHUB_ENV
          echo "next_release_name=${{ env.next_release_milestone }}" >> $GITHUB_ENV
          echo "next_release_tag=${{ env.next_release_milestone }}.0.0" >> $GITHUB_ENV
          echo "next_full_version=${{ env.next_release_milestone }}.${{ env.next_release_branch }}.0" >> $GITHUB_ENV

      - name: Check if release exists and needs update
        id: check_release
        run: |
          # For on-demand builds, we can optionally reuse existing XCFramework
          # This allows re-running the workflow just to update Package.swift

          # Check if release exists
          if gh release view "${{ env.next_release_tag }}" > /dev/null 2>&1; then
            echo "Release ${{ env.next_release_tag }} already exists"

            # Try to download existing XCFramework
            if gh release download "${{ env.next_release_tag }}" -p "${{ env.output_name }}" --clobber 2>/dev/null; then
              echo "✓ Found existing XCFramework in release"
              echo "has_existing_xcframework=true" >> $GITHUB_OUTPUT

              # Extract checksum from existing XCFramework
              CHECKSUM=$(shasum -a 256 "${{ env.output_name }}" | awk '{ print $1 }')
              echo "existing_checksum=$CHECKSUM" >> $GITHUB_OUTPUT
              echo "✓ Extracted checksum: $CHECKSUM"

              # Move to output directory for Package.swift update
              mkdir -p "${{ env.output_dir }}"
              mv "${{ env.output_name }}" "${{ env.output_dir }}/"

              # Don't set should_build=false here - let it rebuild if that's what's requested
            else
              echo "Release exists but no XCFramework found - will build from scratch"
              echo "has_existing_xcframework=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Release does not exist - will build from scratch"
            echo "has_existing_xcframework=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare output directory
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_xcframework != 'true'
        run: |
          mkdir "${{ env.output_dir }}"


      - name: Checkout WebRTC
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_xcframework != 'true'
        run: |
          source "${GITHUB_WORKSPACE}/scripts/checkout_webrtc.sh";
          echo "${PATH}" >> $GITHUB_PATH
          echo ::set-output name=should_build::false
        env:
          WEBRTC_BRANCH: ${{ env.next_release_branch  }}

      - name: Apply SmileCX patches
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_xcframework != 'true'
        run: |
          cd src
          echo "Applying apple_prefix_smilecx patch with fuzzy matching..."
          echo ""
          echo "License Compliance: This patch modifies WebRTC source code (BSD 3-Clause licensed)"
          echo "for symbol prefixing and framework renaming. Original license texts and"
          echo "copyright notices are preserved in LICENSE.md and NOTICE files."
          echo ""

          # Try git apply first (more forgiving)
          if git apply --check --verbose "${GITHUB_WORKSPACE}/patches/apple_prefix_smilecx.patch" 2>&1; then
            echo "Using git apply..."
            git apply "${GITHUB_WORKSPACE}/patches/apple_prefix_smilecx.patch"
          else
            echo "git apply failed, trying patch with fuzz..."
            # Fall back to patch with fuzzy matching (allows 3 lines of context mismatch)
            patch -p1 --fuzz=3 --verbose < "${GITHUB_WORKSPACE}/patches/apple_prefix_smilecx.patch" || {
              echo "❌ Patch failed!"
              echo "Showing reject files:"
              find . -name "*.rej" -exec echo "=== {} ===" \; -exec cat {} \;
              exit 1
            }
          fi

          echo "✓ Patch applied successfully!"
          echo "Verifying patch application..."
          grep -q "SCX" sdk/objc/base/RTCMacros.h && echo "✓ ObjC prefix updated to SCX" || echo "✗ ObjC prefix NOT updated"
          grep -q "SmileCXWebRTC" sdk/BUILD.gn && echo "✓ Framework name updated to SmileCXWebRTC" || echo "✗ Framework name NOT updated"
          grep -q "cx.smile.SmileCXWebRTC" sdk/objc/Info.plist && echo "✓ Bundle ID updated" || echo "✗ Bundle ID NOT updated"

      - name: Build ios x64 simulator
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_xcframework != 'true'
        run: |
          cd src
          source "${GITHUB_WORKSPACE}/scripts/build_webrtc.sh"
        env:
          TARGET_OS: "ios"
          TARGET_CPU: "x64"
          ENVIROMENT: "simulator"

      - name: Build ios arm64 simulator
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_xcframework != 'true'
        run: |
          cd src
          source "${GITHUB_WORKSPACE}/scripts/build_webrtc.sh"
        env:
          TARGET_OS: "ios"
          TARGET_CPU: "arm64"
          ENVIROMENT: "simulator"

      - name: Build ios arm64 device
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_xcframework != 'true'
        run: |
          cd src
          source "${GITHUB_WORKSPACE}/scripts/build_webrtc.sh"
        env:
          TARGET_OS: "ios"
          TARGET_CPU: "arm64"
          ENVIROMENT: "device"

      - name: Create XCFramework
        id: create_xcframework
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_xcframework != 'true'
        run: |
          echo "Creating XCFramework with license compliance files..."
          source "${GITHUB_WORKSPACE}/scripts/create_xcframework.sh"
          echo "✓ XCFramework created with LICENSE.md and NOTICE files"
          cd "${{ env.output_dir }}"
          zip --symlinks -r ${{ env.output_name }} SmileCXWebRTC.xcframework/
          CHECKSUM=$(shasum -a 256 ${{ env.output_name }} | awk '{ print $1 }')

          echo ::set-output name=checksum::$CHECKSUM
        env:
          XCFRAMEWORK_NAME: "SmileCXWebRTC"
          PLISTBUDDY: "/usr/libexec/PlistBuddy"

      - name: Set checksum from existing XCFramework
        if: steps.check_release.outputs.has_existing_xcframework == 'true'
        run: |
          echo "Using existing XCFramework checksum"
          echo "checksum=${{ steps.check_release.outputs.existing_checksum }}" >> $GITHUB_OUTPUT
        id: existing_checksum          

      # - name: Test Create XCFramefork
      #   id: create_xcframework
      #   if: env.should_build == 'true'
      #   run: |
      #     echo "Test" >> "${{ env.output_dir }}/${{ env.output_name }}"
      #     CHECKSUM=$(shasum -a 256 "${{ env.output_dir }}/${{ env.output_name }}" | awk '{ print $1 }')
      #     echo ${CHECKSUM}
      #     echo ::set-output name=checksum::$CHECKSUM
      
      - name: Update Package.swift
        if: env.should_build == 'true' || steps.check_release.outputs.has_existing_xcframework == 'true'
        run: |
          # Use checksum from new build or existing XCFramework
          if [ "${{ steps.check_release.outputs.has_existing_xcframework }}" = "true" ]; then
            CHECKSUM="${{ steps.check_release.outputs.existing_checksum }}"
          else
            CHECKSUM="${{ steps.create_xcframework.outputs.checksum }}"
          fi

          # Expected URL and checksum
          EXPECTED_URL="https://github.com/${{ github.repository }}/releases/download/${{ env.next_release_tag }}/${{ env.output_name }}"

          # Check current values
          CURRENT_URL=$(grep -Eo 'url: "[^"]*"' Package.swift | sed 's/url: "\(.*\)"/\1/')
          CURRENT_CHECKSUM=$(grep -Eo 'checksum: "[^"]*"' Package.swift | sed 's/checksum: "\(.*\)"/\1/')

          # Only update if different
          if [ "$CURRENT_URL" = "$EXPECTED_URL" ] && [ "$CURRENT_CHECKSUM" = "$CHECKSUM" ]; then
            echo "Package.swift already up to date"
            echo "package_swift_updated=false" >> $GITHUB_ENV
          else
            echo "Updating Package.swift..."
            echo "  URL: $CURRENT_URL -> $EXPECTED_URL"
            echo "  Checksum: $CURRENT_CHECKSUM -> $CHECKSUM"

            # Update URL (match any SmileCXWebRTC xcframework URL)
            sed -i '' -E "s,url: \"https://github.com/${{ github.repository }}/releases/download/[^/]+/SmileCXWebRTC-[^\"]+\",url: \"$EXPECTED_URL\",g" Package.swift
            sed -i '' -E "s/checksum: \"[^\"]*\"/checksum: \"$CHECKSUM\"/g" Package.swift

            echo "package_swift_updated=true" >> $GITHUB_ENV
          fi        
      
      - name: Commit Package.swift and create tags
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_xcframework != 'true' && env.package_swift_updated == 'true'
        run: |
          git config --local user.email "${{ github.actor }}[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Package.swift
          git commit -m "Update Package.swift for release ${{ env.next_release_name }}"

          # Create/update milestone tag (force to allow updates)
          git tag -f "${{ env.next_release_tag }}"

          # Push commit and milestone tag
          git push origin master
          git push -f origin "${{ env.next_release_tag }}"

      - name: Commit Package.swift only (no tag push)
        if: steps.check_release.outputs.has_existing_xcframework == 'true' && env.package_swift_updated == 'true'
        run: |
          git config --local user.email "${{ github.actor }}[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Package.swift
          git commit -m "Update Package.swift for release ${{ env.next_release_name }}"
          git push origin master

      - name: Create or update release
        if: env.should_build == 'true' && steps.check_release.outputs.has_existing_xcframework != 'true'
        run: |
          echo "WebRTC Version: ${{ env.next_full_version }}" >> changelog.md
          echo "" >> changelog.md
          echo "WebRTC Branch: [branch-heads/${{ env.next_release_branch }}](https://chromium.googlesource.com/external/webrtc/+log/branch-heads/${{ env.next_release_branch }})" >> changelog.md

          # Check if release exists
          if gh release view "${{ env.next_release_tag }}" > /dev/null 2>&1; then
            echo "Updating existing release with new build..."
            gh release upload "${{ env.next_release_tag }}" "${{ env.output_dir }}/${{ env.output_name }}" --clobber
            echo "✓ Release updated"
          else
            echo "Creating new release..."
            gh release create "${{ env.next_release_tag }}" -t "${{ env.next_release_milestone }}" -F changelog.md "${{ env.output_dir }}/${{ env.output_name }}"
            echo "✓ Release created"
          fi
